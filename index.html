<!DOCTYPE html>
<html>
<head>
	<title>ML project</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
	<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
	<link rel="stylesheet" type="text/css" href="site.css" />
	<script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.13.0/moment.min.js"></script>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
	<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
	<script src="https://www.chartjs.org/dist/2.9.4/Chart.min.js"></script>	
</head>

<body>
<div class="container-fluid d-flex bg-light p-2 h-100">
	<div class="d-flex flex-column mr-1">
		<div class="text-center border rounded-sm bg-white mb-2">Models</div>
		<div id="models" class="border rounded-sm bg-white flex-grow-1 overflow-auto" style="white-space: nowrap;">
			<div class="p-2" align="center"><div class="spinner-border text-primary" role="status"></div><br>Loading...</div>
		</div>
	</div>
	<div class="d-flex flex-column flex-grow-1 ml-1">
		<div class="text-center border rounded-sm bg-white mb-2">A simple ML project to predict the dynamics of stock prices</div>
		<div class="d-flex flex-column border rounded-sm bg-white p-2 flex-grow-1">
			<div id="info" class="d-flex mb-2 border rounded-sm invisible justify-content-center"></div>
			<div class="position-relative mb-2 w-100 h-100">
				<div class="position-absolute w-100 h-100"><canvas id="chart" class="w-100 h-100"></canvas></div>
			</div>
			<div class="d-flex justify-content-between mt-auto">
				<a href="#" class="ml-2" data-toggle="tooltip" data-placement="top" title="The data is received from yahoo finance website">
					<i class="material-icons">help</i>
				</a>
				<div class="d-flex">
					<button type="button" id="trendBackLong" class="btn btn-sm btn-info mx-3"><<</button>
					<button type="button" id="trendBack" class="btn btn-sm btn-info mx-3"><</button>
					<select id="unit" class="rounded-sm bg-info text-white">
						<option value="1">100</option>
						<option value="2">200</option>
						<option value="3">300</option>
						<option value="4">500</option>
						<option value="5">1000</option>
						<option value="6" selected>All</option>
					</select>
					<button type="button" id="trendForward" class="btn btn-sm btn-info mx-3">></button>
					<button type="button" id="trendForwardLong" class="btn btn-sm btn-info mx-3">>></button>
				</div>
				<a href="#" class="mr-2" data-toggle="tooltip" data-placement="top" title="The chart is drawn with chart.js">
					<i class="material-icons">help</i>
				</a>				
			</div>
		</div>
	</div>
</div>
</body>
</html>
